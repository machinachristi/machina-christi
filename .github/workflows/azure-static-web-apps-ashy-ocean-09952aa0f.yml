name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    # Grant the SWA action write access to PRs so it can post the preview URL
    # as a comment. Without this the deploy still succeeds, but the log shows
    # "Unexpectedly failed to add GitHub comment" — the default GITHUB_TOKEN is
    # read-only. Once a permissions block is set, unlisted scopes drop to none,
    # so contents:read is spelled out to keep actions/checkout working.
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ASHY_OCEAN_09952AA0F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "/" # App source code path
          api_location: "" # Api source code path - optional
          output_location: "" # Built app content directory - optional
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ASHY_OCEAN_09952AA0F }}
          action: "close"

  # Headless-browser smoke tests: the gate that world updates (including
  # future AI-authored ones) must pass before merging to main. Runs against
  # a local static server — no Azure dependency, no secrets. Playwright is
  # installed ad hoc on purpose: a package.json committed at the repo root
  # would trigger Oryx build detection in the deploy job above.
  smoke_test_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Smoke Test
    steps:
      - uses: actions/checkout@v4
      - name: Install Playwright (ad hoc — never committed)
        run: |
          npm init -y > /dev/null
          npm i -D @playwright/test@1.61.1
          npx playwright install --with-deps chromium
      - name: Run smoke tests
        env:
          CI: "true"
        run: npx playwright test -c tests/playwright.config.js

  # Independent backstop for the unattended Eden weekly-update automation.
  # That automation self-attests (in its own prompt) two guards before it
  # auto-merges — a strict file-scope limit and a no-network/no-eval grep — but
  # nothing outside the agent enforces them, and this repo pre-approves the exact
  # push/auto-merge commands it uses. This job re-checks both guards from CI so a
  # buggy or bypassed self-check still can't merge unreviewed.
  #
  # It ONLY applies to the automation's own branch convention (feat/world-* or
  # feature/world-*); the gating lives inside the script, so on every other PR
  # (and on push events) the job runs and passes trivially — safe to mark as a
  # required check without ever blocking the user's manual work. Pure
  # git-diff/grep in bash: no Playwright, no npm, no package.json at the root.
  world_diff_guard_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: World Diff Guard
    permissions:
      contents: read
    steps:
      # Full history + the PR head commit itself (not the synthetic merge commit)
      # so the guard can diff against the real merge-base with origin/main.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Enforce Eden diff-scope and malicious-pattern guards
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          git fetch --no-tags origin main
          bash .github/scripts/world-diff-guard.sh origin/main HEAD
