<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#87b5df" />
  <title>The Garden of Eden</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #87b5df;               /* sky tone while three.js boots */
      overscroll-behavior: none;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }

    canvas { display: block; touch-action: none; }
  </style>
  <script>
    // Error relay to the parent shell (world.html). Registered before the
    // module script so that even a failure to fetch/parse the app itself is
    // reported — the parent decides what the visitor sees.
    (function () {
      function report(message) {
        try {
          if (window.parent !== window) {
            window.parent.postMessage(
              { type: 'world:error', message: String(message || 'unknown error') },
              '*'
            );
          }
        } catch (_) { /* no parent — standalone visit */ }
      }
      window.addEventListener('error', function (e) { report(e.message); });
      window.addEventListener('unhandledrejection', function (e) {
        report(e.reason && e.reason.message ? e.reason.message : e.reason);
      });
    })();
  </script>
  <script type="importmap">
    {
      "imports": {
        "three": "./vendor/three.module.min.js"
      }
    }
  </script>
</head>
<body>
  <script type="module" src="main.js"></script>
</body>
</html>
