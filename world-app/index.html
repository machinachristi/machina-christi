<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#87b5df" />
  <!-- This document is the world's iframe interior; world.html is the page
       people should land on. Keep this one out of search results. -->
  <meta name="robots" content="noindex" />
  <title>The Garden of Eden</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #87b5df;               /* sky tone while three.js boots */
      overscroll-behavior: none;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }

    canvas { display: block; touch-action: none; }

    /* The ambience toggle (created by audio.js) — a quiet pill in the
       corner, echoing the shell's "return home" styling. */
    .sound {
      position: fixed;
      right: max(14px, env(safe-area-inset-right));
      bottom: max(14px, env(safe-area-inset-bottom));
      z-index: 10;
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      border: 1px solid rgba(201, 162, 39, 0.35);
      background: rgba(11, 10, 8, 0.4);
      color: rgba(232, 213, 163, 0.9);
      cursor: pointer;
      -webkit-backdrop-filter: blur(6px);
      backdrop-filter: blur(6px);
      touch-action: manipulation;
      transition: border-color 0.25s ease, background 0.25s ease;
    }
    .sound:hover, .sound:focus-visible {
      border-color: rgba(201, 162, 39, 0.7);
      background: rgba(11, 10, 8, 0.6);
      outline: none;
    }
    .sound svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.7;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .sound .slash { display: none; }
    .sound--off .wave { display: none; }
    .sound--off .slash { display: block; }
    .sound--off { color: rgba(232, 213, 163, 0.55); }

    /* The naming caption (created by main.js) — Genesis 2:19-20: draw near
       a creature and its name is given, a quiet line above the safe area.
       Pointer-transparent so walking is never blocked by it. */
    .naming {
      position: fixed;
      left: 50%;
      bottom: max(64px, calc(env(safe-area-inset-bottom) + 50px));
      transform: translateX(-50%) translateY(7px);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.55s ease, transform 0.55s ease;
      font-family: "Iowan Old Style", Palatino, "Palatino Linotype", "Book Antiqua", Georgia, serif;
      text-align: center;
      text-shadow: 0 1px 12px rgba(11, 10, 8, 0.6), 0 0 3px rgba(11, 10, 8, 0.4);
    }
    .naming--shown { opacity: 1; transform: translateX(-50%) translateY(0); }
    .naming__name {
      font-size: 21px;
      letter-spacing: 0.14em;
      text-indent: 0.14em;
      color: #e8d5a3;
    }
    .naming__label {
      font-size: 13px;
      letter-spacing: 0.24em;
      text-indent: 0.24em;
      text-transform: uppercase;
      color: rgba(232, 213, 163, 0.78);
    }
  </style>
  <script>
    // Error relay to the parent shell (world.html). Registered before the
    // module script so that even a failure to fetch/parse the app itself is
    // reported — the parent decides what the visitor sees.
    (function () {
      function report(message) {
        try {
          if (window.parent !== window) {
            window.parent.postMessage(
              { type: 'world:error', message: String(message || 'unknown error') },
              '*'
            );
          }
        } catch (_) { /* no parent — standalone visit */ }
      }
      window.addEventListener('error', function (e) { report(e.message); });
      window.addEventListener('unhandledrejection', function (e) {
        report(e.reason && e.reason.message ? e.reason.message : e.reason);
      });
    })();
  </script>
  <script type="importmap">
    {
      "imports": {
        "three": "./vendor/three.module.min.js"
      }
    }
  </script>
  <!-- The whole module graph, declared up front. Without these hints the
       browser discovers imports one level at a time — main.js, then the
       scenes, then three.module, then three.core (the biggest file, found
       last) — a serial waterfall of round trips before the garden can boot.
       Preloading lets everything download in parallel from the first moment.
       When adding a scene, add a line here too; forgetting one never breaks
       anything — that file just loses its head start and is fetched on
       discovery, as before. -->
  <link rel="modulepreload" href="vendor/three.module.min.js" />
  <link rel="modulepreload" href="vendor/three.core.min.js" />
  <link rel="modulepreload" href="main.js" />
  <link rel="modulepreload" href="util.js" />
  <link rel="modulepreload" href="controls.js" />
  <link rel="modulepreload" href="camera-rig.js" />
  <link rel="modulepreload" href="character.js" />
  <link rel="modulepreload" href="audio.js" />
  <link rel="modulepreload" href="scenes/garden.js" />
  <link rel="modulepreload" href="scenes/terrain.js" />
  <link rel="modulepreload" href="scenes/sky.js" />
  <link rel="modulepreload" href="scenes/water.js" />
  <link rel="modulepreload" href="scenes/vegetation.js" />
  <link rel="modulepreload" href="scenes/creatures.js" />
  <link rel="modulepreload" href="scenes/stones.js" />
  <link rel="modulepreload" href="scenes/mist.js" />
  <link rel="modulepreload" href="scenes/reeds.js" />
  <link rel="modulepreload" href="scenes/gate.js" />
  <link rel="modulepreload" href="scenes/presence.js" />
  <link rel="modulepreload" href="scenes/reflections.js" />
  <link rel="modulepreload" href="scenes/wake.js" />
  <link rel="modulepreload" href="scenes/petals.js" />
  <link rel="modulepreload" href="scenes/dew.js" />
  <link rel="modulepreload" href="scenes/wind.js" />
  <link rel="modulepreload" href="scenes/spring.js" />
  <link rel="modulepreload" href="scenes/fruit.js" />
  <link rel="modulepreload" href="scenes/footprints.js" />
</head>
<body>
  <script type="module" src="main.js"></script>
</body>
</html>
