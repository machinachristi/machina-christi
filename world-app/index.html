<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#87b5df" />
  <!-- This document is the world's iframe interior; world.html is the page
       people should land on. Keep this one out of search results. -->
  <meta name="robots" content="noindex" />
  <title>The Garden of Eden</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #87b5df;               /* sky tone while three.js boots */
      overscroll-behavior: none;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }

    canvas { display: block; touch-action: none; }

    /* The ambience toggle (created by audio.js) — a quiet pill in the
       corner, echoing the shell's "return home" styling. */
    .sound {
      position: fixed;
      right: max(14px, env(safe-area-inset-right));
      bottom: max(14px, env(safe-area-inset-bottom));
      z-index: 10;
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      border: 1px solid rgba(201, 162, 39, 0.35);
      background: rgba(11, 10, 8, 0.4);
      color: rgba(232, 213, 163, 0.9);
      cursor: pointer;
      -webkit-backdrop-filter: blur(6px);
      backdrop-filter: blur(6px);
      touch-action: manipulation;
      transition: border-color 0.25s ease, background 0.25s ease;
    }
    .sound:hover, .sound:focus-visible {
      border-color: rgba(201, 162, 39, 0.7);
      background: rgba(11, 10, 8, 0.6);
      outline: none;
    }
    .sound svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.7;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .sound .slash { display: none; }
    .sound--off .wave { display: none; }
    .sound--off .slash { display: block; }
    .sound--off { color: rgba(232, 213, 163, 0.55); }
  </style>
  <script>
    // Error relay to the parent shell (world.html). Registered before the
    // module script so that even a failure to fetch/parse the app itself is
    // reported — the parent decides what the visitor sees.
    (function () {
      function report(message) {
        try {
          if (window.parent !== window) {
            window.parent.postMessage(
              { type: 'world:error', message: String(message || 'unknown error') },
              '*'
            );
          }
        } catch (_) { /* no parent — standalone visit */ }
      }
      window.addEventListener('error', function (e) { report(e.message); });
      window.addEventListener('unhandledrejection', function (e) {
        report(e.reason && e.reason.message ? e.reason.message : e.reason);
      });
    })();
  </script>
  <script type="importmap">
    {
      "imports": {
        "three": "./vendor/three.module.min.js"
      }
    }
  </script>
</head>
<body>
  <script type="module" src="main.js"></script>
</body>
</html>
