<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0a08" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Machina Christi" />
  <meta name="description" content="Machina Christi — home to Camino, an endless runner, and Eden, a living 3D garden." />
  <title>Machina Christi</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:        #0b0a08;
      --gold:      #c9a227;
      --gold-soft: #e8d5a3;
      --wood:      #3a2c1e;
      --wood-hi:   #5a4632;
      --amber:     255, 196, 92;   /* warm candle glow (rgb parts) */
      --leaf:      168, 205, 140;  /* living green spilling from the garden */
    }

    html, body {
      height: 100dvh;
      background: var(--bg);
      color: var(--gold-soft);
      font-family: Georgia, 'Times New Roman', serif;
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }

    /* A single warm ember of light at the centre; the edges fall to black. */
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(28px, 6vh, 64px);
      background:
        radial-gradient(120% 90% at 50% 42%, rgba(120, 92, 48, 0.28), transparent 60%),
        radial-gradient(140% 120% at 50% 120%, rgba(90, 70, 40, 0.22), transparent 55%),
        var(--bg);
      position: relative;
      transition: opacity 0.6s ease;
    }

    /* Faint drifting motes, echoing the game's atmosphere. */
    body::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(1.5px 1.5px at 20% 30%, rgba(232,213,163,0.35), transparent),
        radial-gradient(1.5px 1.5px at 75% 25%, rgba(232,213,163,0.25), transparent),
        radial-gradient(1.5px 1.5px at 60% 70%, rgba(232,213,163,0.30), transparent),
        radial-gradient(1.5px 1.5px at 35% 80%, rgba(232,213,163,0.20), transparent);
      opacity: 0.6;
      animation: drift 14s ease-in-out infinite alternate;
    }
    @keyframes drift {
      from { transform: translateY(0); }
      to   { transform: translateY(-14px); }
    }

    .title {
      text-align: center;
      z-index: 1;
    }
    .title h1 {
      font-weight: normal;
      font-size: clamp(30px, 8vw, 52px);
      letter-spacing: 0.28em;
      text-indent: 0.28em;   /* balance the trailing letter-spacing */
      line-height: 1.15;
      color: var(--gold);
      text-shadow: 0 0 24px rgba(var(--amber), 0.35);
    }
    .title h1 .line { display: block; white-space: nowrap; }

    /* ── Doors ─────────────────────────────────────────────── */
    .doors {
      display: flex;
      gap: clamp(28px, 9vw, 88px);
      z-index: 1;
      perspective: 1400px;
    }

    .door {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }

    .door__frame {
      position: relative;
      width: clamp(96px, 30vw, 150px);
      aspect-ratio: 5 / 9;
      border-radius: 50% 50% 6px 6px / 30% 30% 4px 4px;   /* arched top */
      transform-style: preserve-3d;
      transition: transform 0.35s ease, filter 0.35s ease;
      filter: drop-shadow(0 0 10px rgba(var(--glow, var(--amber)), 0.18));
    }

    /* The warm light spilling from behind / around the closed door. */
    .door__frame::before {
      content: "";
      position: absolute;
      inset: -22% -30%;
      border-radius: 50%;
      background: radial-gradient(closest-side, rgba(var(--glow, var(--amber)), 0.28), transparent 72%);
      opacity: 0.55;
      transition: opacity 0.4s ease, transform 0.4s ease;
      z-index: -1;
    }

    /* The lit threshold behind the door, revealed as it opens. */
    .door__threshold {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background:
        radial-gradient(80% 60% at 50% 40%, rgba(var(--glow, var(--amber)), 0.9), rgba(var(--glow, var(--amber)), 0.25) 70%, transparent);
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    /* The door leaf itself — planked wood with iron bands. */
    .door__panel {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      transform-origin: left center;
      transform: rotateY(0deg);
      transition: transform 0.7s cubic-bezier(0.34, 0.02, 0.2, 1), box-shadow 0.35s ease;
      background:
        repeating-linear-gradient(90deg,
          var(--wood) 0, var(--wood) 14px,
          rgba(0,0,0,0.28) 14px, rgba(0,0,0,0.28) 15px,
          var(--wood-hi) 15px, var(--wood-hi) 16px,
          var(--wood) 16px, var(--wood) 30px);
      box-shadow:
        inset 0 0 0 3px rgba(0,0,0,0.35),
        inset 0 0 22px rgba(0,0,0,0.55),
        0 10px 24px rgba(0,0,0,0.5);
      overflow: hidden;
    }
    /* Iron bands + a hint of a ring handle. */
    .door__panel::before {
      content: "";
      position: absolute;
      left: 0; right: 0;
      top: 26%; height: 5px;
      background: rgba(20, 16, 10, 0.7);
      box-shadow: 0 32% 0 rgba(20,16,10,0.7), 0 -4px 0 rgba(90,70,40,0.25);
    }
    .door__panel::after {
      content: "";
      position: absolute;
      right: 14%;
      top: 50%;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 8px rgba(var(--glow, var(--amber)), 0.6);
      transform: translateY(-50%);
    }

    .door__label {
      font-size: clamp(13px, 3.6vw, 17px);
      letter-spacing: 0.18em;
      text-indent: 0.18em;
      color: rgba(232, 213, 163, 0.75);
      transition: color 0.3s ease, text-shadow 0.3s ease;
      white-space: nowrap;
    }
    /* The garden door glows green — living light through the crack. */
    .door--world { --glow: var(--leaf); }

    /* Hover / focus — the door brightens and lifts, light swells. */
    .door:hover  .door__frame,
    .door:focus-visible .door__frame {
      transform: translateY(-6px) scale(1.02);
      filter: drop-shadow(0 0 22px rgba(var(--glow, var(--amber)), 0.5));
    }
    .door:hover  .door__frame::before,
    .door:focus-visible .door__frame::before {
      opacity: 1;
      transform: scale(1.08);
    }
    .door:hover  .door__label,
    .door:focus-visible .door__label {
      color: var(--gold-soft);
      text-shadow: 0 0 14px rgba(var(--glow, var(--amber)), 0.45);
    }
    .door:focus-visible { outline: none; }
    .door:focus-visible .door__frame {
      outline: 2px solid rgba(var(--glow, var(--amber)), 0.7);
      outline-offset: 10px;
      border-radius: inherit;
    }

    /* ── Opening: the chosen door swings wide, its light floods out. ── */
    .door.opening .door__panel {
      transform: rotateY(-108deg);
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    }
    .door.opening .door__threshold { opacity: 1; }
    .door.opening .door__frame {
      transform: translateY(-6px) scale(1.04);
      filter: drop-shadow(0 0 44px rgba(var(--glow, var(--amber)), 0.85));
    }

    /* A full-screen wash of light as we step through. */
    .flash {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 50% 55%, rgba(var(--flash-glow, var(--amber)), 0.95), rgba(var(--flash-glow, var(--amber)), 0.6) 40%, transparent 75%);
      opacity: 0;
      pointer-events: none;
      z-index: 5;
      transition: opacity 0.55s ease;
    }
    .flash.on { opacity: 1; }

    /* ── Text fallback ─────────────────────────────────────── */
    .fallback {
      position: fixed;
      bottom: max(18px, env(safe-area-inset-bottom));
      left: 0; right: 0;
      text-align: center;
      font-size: 12px;
      letter-spacing: 0.14em;
      z-index: 1;
    }
    .fallback a {
      color: rgba(232, 213, 163, 0.45);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      padding-bottom: 1px;
      transition: color 0.25s ease, border-color 0.25s ease;
    }
    .fallback a:hover,
    .fallback a:focus-visible { color: var(--gold-soft); border-color: rgba(232,213,163,0.5); outline: none; }

    @media (max-width: 360px) {
      .doors { gap: 22px; }
    }

    /* Respect reduced-motion: no drifting, no slow swing. */
    @media (prefers-reduced-motion: reduce) {
      body::after { animation: none; }
      .door__frame, .door__panel, .door__threshold, .flash { transition-duration: 0.15s; }
    }
  </style>
</head>
<body>
  <header class="title">
    <h1><span class="line">MACHINA</span><span class="line">CHRISTI</span></h1>
  </header>

  <nav class="doors" aria-label="Choose an experience">
    <a class="door door--runner" href="game.html" aria-label="Enter Camino">
      <span class="door__frame">
        <span class="door__threshold" aria-hidden="true"></span>
        <span class="door__panel" aria-hidden="true"></span>
      </span>
      <span class="door__label">Camino</span>
    </a>

    <a class="door door--world" href="world.html" aria-label="Enter Eden">
      <span class="door__frame">
        <span class="door__threshold" aria-hidden="true"></span>
        <span class="door__panel" aria-hidden="true"></span>
      </span>
      <span class="door__label">Eden</span>
    </a>
  </nav>

  <footer class="fallback">
    <a href="about.html">about this site</a>
  </footer>

  <div class="flash" aria-hidden="true"></div>

  <script>
    const flash = document.querySelector('.flash');
    const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    // Walk *through* the door: open it, flood the screen with its light, then go.
    function enter(door, href) {
      if (door.dataset.entering) return;
      door.dataset.entering = '1';

      // Tint the flash to match the door's own glow (warm runner / green garden).
      const glow = door.classList.contains('door--world') ? '168, 205, 140' : '255, 196, 92';
      flash.style.setProperty('--flash-glow', glow);

      const delay = prefersReduced ? 120 : 620;
      door.classList.add('opening');
      setTimeout(() => flash.classList.add('on'), prefersReduced ? 0 : 320);
      document.body.style.opacity = '0';
      setTimeout(() => { window.location.href = href; }, delay);
    }

    document.querySelectorAll('.door').forEach(door => {
      door.addEventListener('click', e => {
        e.preventDefault();
        enter(door, door.getAttribute('href'));
      });
      // Enter/Space on a focused door behaves like a click.
      door.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          enter(door, door.getAttribute('href'));
        }
      });
    });

    // Back button after a door click restores this exact page from the
    // browser's bfcache — including the mid-transition opacity:0 / .opening /
    // entering-lock state enter() had just set. Undo it so a restored page
    // isn't stuck invisible with dead doors.
    window.addEventListener('pageshow', e => {
      if (!e.persisted) return;
      document.body.style.opacity = '1';
      flash.classList.remove('on');
      document.querySelectorAll('.door').forEach(door => {
        door.classList.remove('opening');
        delete door.dataset.entering;
      });
    });
  </script>
</body>
</html>
