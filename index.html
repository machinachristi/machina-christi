  <title>Machina Christi</title>
  <!-- Marks that scripting is alive before first paint, so the quiet arrival
       fade only plays when JS can run it. Without JS the page renders fully
       visible and the portals are plain links in a native scroll-snap strip. -->
  <script>document.documentElement.classList.add('js');</script>
  <!-- Every journey from this room goes through one of four doors — fetch
       their pages (just the HTML, a few KB each; none of their data or 3D
       payloads) while the visitor is still choosing, so the walk through a
       gate lands on an already-delivered page. Browsers without prefetch
       simply ignore these. -->
  <link rel="prefetch" href="game.html" />
  <link rel="prefetch" href="world.html" />
  <link rel="prefetch" href="about.html" />
  <link rel="prefetch" href="ordo.html" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:        #0b0a08;
      --gold:      #c9a227;
      --gold-soft: #e8d5a3;
      --amber:     255, 196, 92;   /* Camino — warm lamplight (rgb parts) */
      --leaf:      168, 205, 140;  /* Eden — living green */
      --violet:    176, 150, 214;  /* Ordo — quiet, contemplative */
      --parchment: 216, 198, 170;  /* About — the written word */
      --serif:     "Iowan Old Style", Palatino, "Palatino Linotype", "Book Antiqua", Georgia, serif;
      /* Portal width answers to both screen axes so the gallery always fits
         beneath the hero: never wider than the phone allows a neighbor to
         peek, never taller than the room. Kept trim so the name leads and
         the neighbors clearly peek in — a swipe is one glance away. */
      --card-w:   clamp(150px, min(52vw, 33dvh), 250px);
      --card-gap: clamp(14px, 3vw, 26px);
    }

    html, body {
      height: 100dvh;
      background: var(--bg);
      color: var(--gold-soft);
      font-family: var(--serif);
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }

    body {
      display: flex;
      flex-direction: column;
      background:
        radial-gradient(110% 70% at 50% 30%, rgba(120, 92, 48, 0.14), transparent 62%),
        var(--bg);
      transition: opacity 0.24s ease 0.04s;
    }
    body.leaving { opacity: 0; }

    /* Dust hanging in the air — pure CSS, the same quiet trick about.html uses. */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(1.5px 1.5px at 20% 30%, rgba(232, 213, 163, 0.26), transparent),
        radial-gradient(1px 1px at 75% 22%, rgba(232, 213, 163, 0.18), transparent),
        radial-gradient(1.5px 1.5px at 62% 74%, rgba(232, 213, 163, 0.2), transparent),
        radial-gradient(1px 1px at 32% 82%, rgba(232, 213, 163, 0.14), transparent);
      opacity: 0.4;
      animation: drift 18s ease-in-out infinite alternate;
    }
    @keyframes drift { from { transform: translateY(0); } to { transform: translateY(-12px); } }

    /* ── The hero ──────────────────────────────────────────────
       The name over the gate. */
    .hero {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 13px;
      padding: clamp(30px, 9dvh, 84px) 20px 0;
      transition: opacity 1.1s ease, transform 1.1s ease;
    }
    .hero h1 {
      font-weight: normal;
      font-size: clamp(34px, 9.5vw, 64px);
      letter-spacing: 0.34em;
      text-indent: 0.34em;   /* balance the trailing letter-spacing */
      line-height: 1.32;
      color: var(--gold);
      text-shadow: 0 0 24px rgba(var(--amber), 0.22);
    }
    .hero h1 .line { display: block; white-space: nowrap; }
    /* A thin gold rule beneath the name, like a line ruled in an old book. */
    .hero .rule {
      width: clamp(64px, 16vw, 110px);
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201, 162, 39, 0.6), transparent);
    }

    /* ── The gallery of gates ──────────────────────────────────
       A row of thresholds standing along the way. The strip is a
       native scroll-snap scroller: swipe on a phone, drag or use
       the arrows on a desk, plain links without JS. */
    .gallery {
      position: relative;
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      transition: opacity 1.1s ease 0.15s, transform 1.1s ease 0.15s;
    }

    .strip {
      display: flex;
      gap: var(--card-gap);
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      /* Room at either end so the first and last gate can stand centered. */
      padding-inline: calc(50% - var(--card-w) / 2);
      padding-block: 24px 18px;
      scrollbar-width: none;
      touch-action: pan-x;
      overscroll-behavior-x: contain;
    }
    .strip::-webkit-scrollbar { display: none; }
    @media (hover: hover) and (pointer: fine) {
      .strip { cursor: grab; }
      .strip.dragging { cursor: grabbing; }
    }
    .strip.dragging { scroll-snap-type: none; }

    /* The way loops: swiping past Camino or Ordo doesn't scroll through
       to a preview of the other end (that would spoil it, and looks like
       a stray duplicate card) — the strip fades out, jumps, and fades
       back in already standing at the far gate. */
    .strip { transition: opacity 0.16s ease; }
    .strip.fading { opacity: 0; }

    /* ── A portal ──────────────────────────────────────────────
       Each experience is one narrow gate: arch, emblem, name,
       a word of description, and the cue to enter. To add a new
       experience, copy one of these blocks in the HTML below —
       the dots, activation, and entry wiring pick it up on load. */
    .portal {
      position: relative;
      flex: 0 0 var(--card-w);
      aspect-ratio: 5 / 8;
      scroll-snap-align: center;
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      touch-action: manipulation;
      outline: none;
      border: 1px solid rgba(201, 162, 39, 0.3);
      border-radius: 50% 50% 14px 14px / 30% 30% 14px 14px;
      background: rgba(201, 162, 39, 0.03);
      box-shadow: inset 0 0 34px rgba(0, 0, 0, 0.45);
      overflow: hidden;
      transition: opacity 0.5s ease, transform 0.5s ease,
                  border-color 0.35s ease, box-shadow 0.35s ease;
    }
    /* A second, inner hairline — the moulding of the arch. */
    .portal::before {
      content: "";
      position: absolute;
      inset: 7px;
      border: 1px solid rgba(201, 162, 39, 0.14);
      border-radius: 50% 50% 10px 10px / 30% 30% 10px 10px;
      pointer-events: none;
      transition: border-color 0.35s ease;
    }

    .portal--camino { --glow: var(--amber); }
    .portal--eden   { --glow: var(--leaf); }
    .portal--ordo   { --glow: var(--violet); }
    .portal--about  { --glow: var(--parchment); }

    /* The light waiting past each threshold. */
    .portal__halo {
      position: absolute;
      inset: 0;
      background: radial-gradient(95% 55% at 50% 100%, rgba(var(--glow), 0.26), transparent 76%);
      opacity: 0.35;
      transition: opacity 0.5s ease;
      pointer-events: none;
    }

    .portal__vignette {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: 10%;
    }
    .portal__vignette svg {
      width: 40%;
      height: auto;
      stroke: rgb(213, 180, 86);
      fill: none;
      stroke-width: 1.6;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 6px rgba(var(--glow), 0.35));
      opacity: 0.75;
      transition: opacity 0.5s ease;
    }

    .portal__title {
      position: relative;
      text-align: center;
      font-size: clamp(15px, 4.6vw, 19px);
      letter-spacing: 0.24em;
      text-indent: 0.24em;
      text-transform: uppercase;
      color: var(--gold-soft);
      transition: color 0.35s ease, text-shadow 0.35s ease;
      white-space: nowrap;
    }
    .portal__desc {
      position: relative;
      text-align: center;
      font-style: italic;
      font-size: clamp(13px, 3.6vw, 15px);
      line-height: 1.5;
      color: rgba(232, 213, 163, 0.55);
      padding: 8px 12% clamp(20px, 8%, 30px);
      transition: color 0.35s ease;
    }

    /* One shared cue beneath the gates, in place of the word "enter" once
       repeated on every arch. A single line reads cleaner and larger; the
       JS below swaps "Tap" for "Click" on a mouse pointer. */
    .hint {
      text-align: center;
      font-style: italic;
      font-size: clamp(15px, 4.2vw, 18px);
      letter-spacing: 0.16em;
      text-indent: 0.16em;
      color: rgba(232, 213, 163, 0.62);
      padding: 0 20px;
      margin-top: 6px;
    }

    /* With JS, gates away from the center rest dimmer and a step back;
       the centered one is awake. Without JS every gate stands fully lit. */
    .js .portal { opacity: 0.5; transform: scale(0.94); }
    .js .portal.is-active { opacity: 1; transform: scale(1); }
    .js .portal.is-active .portal__halo { opacity: 0.65; }
    .js .portal.is-active .portal__vignette svg { opacity: 1; }

    /* Hover / focus — the threshold kindles. */
    .portal:hover, .portal:focus-visible {
      border-color: rgba(201, 162, 39, 0.65);
      box-shadow:
        inset 0 0 34px rgba(0, 0, 0, 0.3),
        0 16px 44px -18px rgba(var(--glow), 0.35);
    }
    .portal:hover::before, .portal:focus-visible::before { border-color: rgba(201, 162, 39, 0.3); }
    .portal:hover .portal__halo, .portal:focus-visible .portal__halo { opacity: 0.9; }
    .portal:hover .portal__title, .portal:focus-visible .portal__title {
      color: #fff;
      text-shadow: 0 0 14px rgba(var(--glow), 0.45);
    }
    .portal:hover .portal__desc, .portal:focus-visible .portal__desc { color: rgba(232, 213, 163, 0.78); }
    .portal:focus-visible {
      outline: 1px solid rgba(var(--glow), 0.65);
      outline-offset: 6px;
    }

    /* Walking through: the chosen gate floods with its own light
       while the room fades. */
    .portal.opening {
      border-color: rgba(var(--glow), 0.85);
      box-shadow:
        inset 0 0 54px rgba(var(--glow), 0.22),
        0 0 60px -10px rgba(var(--glow), 0.4);
    }
    .portal.opening .portal__halo {
      opacity: 1;
      background: radial-gradient(120% 90% at 50% 95%, rgba(var(--glow), 0.55), transparent 86%);
    }

    /* ── Waymarks ──────────────────────────────────────────────
       One small stone per gate beneath the strip. Built by JS;
       absent (and unneeded) without it. */
    .waymarks {
      display: flex;
      justify-content: center;
      min-height: 38px;
      margin-bottom: max(14px, env(safe-area-inset-bottom));
    }
    .waymarks button {
      position: relative;
      width: 40px;
      height: 38px;
      background: none;
      border: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .waymarks button::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 13px;
      height: 13px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background: rgba(201, 162, 39, 0.3);
      transition: background 0.3s ease, box-shadow 0.3s ease;
    }
    .waymarks button:hover::after,
    .waymarks button:focus-visible::after { background: rgba(232, 213, 163, 0.6); }
    .waymarks button:focus-visible { outline: 1px solid rgba(201, 162, 39, 0.5); outline-offset: -4px; border-radius: 50%; }
    .waymarks button[aria-current="true"]::after {
      background: rgba(232, 213, 163, 0.92);
      box-shadow: 0 0 11px rgba(var(--amber), 0.5);
    }

    /* ── Desktop arrows ────────────────────────────────────────
       Quiet chevrons at the gallery's edges; created by JS only
       on hover-capable pointers. */
    .arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 2;
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: 1px solid rgba(201, 162, 39, 0.24);
      border-radius: 50%;
      color: rgba(232, 213, 163, 0.55);
      font-family: var(--serif);
      font-size: 22px;
      line-height: 1;
      padding-bottom: 3px;
      cursor: pointer;
      transition: border-color 0.3s ease, color 0.3s ease, opacity 0.3s ease;
    }
    .arrow--prev { left: clamp(10px, 3.5vw, 34px); }
    .arrow--next { right: clamp(10px, 3.5vw, 34px); }
    .arrow:hover, .arrow:focus-visible {
      border-color: rgba(201, 162, 39, 0.6);
      color: var(--gold-soft);
      outline: none;
    }
    .arrow:disabled { opacity: 0.2; pointer-events: none; }

    /* ── Arrival ───────────────────────────────────────────────
       One gentle fade-up: the hero first, the gates a breath after. */
    .js body:not(.lit) .hero,
    .js body:not(.lit) .gallery { opacity: 0; transform: translateY(10px); }

    /* Very short screens (landscape phones): let the page scroll
       vertically rather than crush the gates. */
    @media (max-height: 480px) {
      html, body { height: auto; min-height: 100dvh; overflow: auto; overflow-x: hidden; }
      .hero { padding-top: 18px; }
    }

    /* Respect reduced-motion: the room is simply there, already lit. */
    @media (prefers-reduced-motion: reduce) {
      body::before { animation: none; }
      .hero, .gallery, .strip { transition: none; }
      .portal { transition: border-color 0.2s ease, box-shadow 0.2s ease; }
      body { transition: opacity 0.15s ease 0s; }
    }
  </style>
</head>
<body>
  <header class="hero">
    <h1><span class="line">MACHINA</span><span class="line">CHRISTI</span></h1>
    <div class="rule" aria-hidden="true"></div>
  </header>

  <nav class="gallery" aria-label="Experiences">
    <div class="strip">
      <!-- To add a new experience: copy one .portal block below and set its
           href, glyph, title, and description. The waymark dots, centered-card
           activation, and entry transition are all wired up from the DOM. -->
      <a class="portal portal--camino" href="game.html" aria-label="Enter Camino, the pilgrim's road">
        <span class="portal__halo" aria-hidden="true"></span>
        <span class="portal__vignette" aria-hidden="true">
          <svg viewBox="0 0 48 64">
            <!-- a wayside cross above the road -->
            <path d="M24 12 V44" />
            <path d="M14 22 H34" />
            <path d="M10 54 Q24 48 38 54" />
          </svg>
        </span>
        <span class="portal__title">Camino</span>
        <span class="portal__desc">the pilgrim&rsquo;s road</span>
      </a>

      <a class="portal portal--eden" href="world.html" aria-label="Enter Eden, the digital garden">
        <span class="portal__halo" aria-hidden="true"></span>
        <span class="portal__vignette" aria-hidden="true">
          <svg viewBox="0 0 48 64">
            <!-- the tree of life, bearing fruit -->
            <path d="M24 56 V20" />
            <path d="M24 38 C16 36 11 30 10 22" />
            <path d="M24 38 C32 36 37 30 38 22" />
            <circle cx="10" cy="17.5" r="2.8" />
            <circle cx="38" cy="17.5" r="2.8" />
            <circle cx="24" cy="14.5" r="2.8" />
          </svg>
        </span>
        <span class="portal__title">Eden</span>
        <span class="portal__desc">the digital garden</span>
      </a>

      <a class="portal portal--about" href="about.html" aria-label="About Machina Christi, the story behind it all">
        <span class="portal__halo" aria-hidden="true"></span>
        <span class="portal__vignette" aria-hidden="true">
          <svg viewBox="0 0 48 64">
            <!-- an open book -->
            <path d="M24 18 V50" />
            <path d="M24 20 C19 15.5 13 15 8 17 V47 C13 45 19 45.5 24 50" />
            <path d="M24 20 C29 15.5 35 15 40 17 V47 C35 45 29 45.5 24 50" />
          </svg>
        </span>
        <span class="portal__title">About</span>
        <span class="portal__desc">the story behind it all</span>
      </a>

      <a class="portal portal--ordo" href="ordo.html" aria-label="Enter Ordo, today in the Church">
        <span class="portal__halo" aria-hidden="true"></span>
        <span class="portal__vignette" aria-hidden="true">
          <svg viewBox="0 0 48 64">
            <!-- a candle burning before an open page -->
            <path d="M24 10 C20 16 18 20 18 24 C18 28.4 20.7 31 24 31 C27.3 31 30 28.4 30 24 C30 20 28 16 24 10 Z" />
            <path d="M20 31 V50 H28 V31" />
            <path d="M11 50 H37" />
          </svg>
        </span>
        <span class="portal__title">Ordo</span>
        <span class="portal__desc">today in the Church</span>
      </a>
    </div>

    <p class="hint">Tap a gate to enter</p>
    <div class="waymarks"></div>
  </nav>

  <script>
    (() => {
      'use strict';

      const reduced  = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      const strip    = document.querySelector('.strip');
      const gallery  = document.querySelector('.gallery');
      const waymarks = document.querySelector('.waymarks');
      const portals  = Array.from(document.querySelectorAll('.portal'));

      let active = -1;
      let leaving = false;
      let wrapping = false;
      let prevBtn = null, nextBtn = null;

      /* ── Moving along the way ───────────────────────────────── */
      function center(i, instant) {
        const p = portals[i];
        strip.scrollTo({
          left: p.offsetLeft + p.offsetWidth / 2 - strip.clientWidth / 2,
          behavior: (reduced || instant) ? 'auto' : 'smooth',
        });
      }

      function nearest() {
        const mid = strip.scrollLeft + strip.clientWidth / 2;
        let best = 0, bestDist = Infinity;
        portals.forEach((p, i) => {
          const d = Math.abs(p.offsetLeft + p.offsetWidth / 2 - mid);
          if (d < bestDist) { bestDist = d; best = i; }
        });
        return best;
      }

      function setActive(i) {
        if (i === active) return;
        active = i;
        portals.forEach((p, j) => p.classList.toggle('is-active', j === i));
        dots.forEach((d, j) => {
          if (j === i) d.setAttribute('aria-current', 'true');
          else d.removeAttribute('aria-current');
        });
      }

      // The scroller drives everything: one rAF-coalesced listener,
      // no idle work when the page is at rest.
      let ticking = false;
      function onScroll() {
        if (ticking || wrapping) return;
        ticking = true;
        requestAnimationFrame(() => {
          ticking = false;
          setActive(nearest());
        });
      }
      strip.addEventListener('scroll', onScroll, { passive: true });
      window.addEventListener('resize', onScroll);

      // The way loops: past Ordo is Camino again, past Camino is Ordo.
      // Rather than scroll through to a peek of the far gate first (which
      // would spoil it and briefly show what looks like a stray duplicate
      // card), a swipe past either end is a quick cut — fade out, jump,
      // fade in already standing at the other end — same beat as any other
      // step, just landing on the gate that closes the loop.
      const WRAP_FADE = 140;
      function wrapTo(i) {
        if (leaving || wrapping) return;
        wrapping = true;
        strip.classList.add('fading');
        setTimeout(() => {
          center(i, true);
          setActive(i);
          requestAnimationFrame(() => requestAnimationFrame(() => {
            strip.classList.remove('fading');
            wrapping = false;
          }));
        }, reduced ? 0 : WRAP_FADE);
      }

      // One step in either direction; off the end, wrap instead of stopping.
      function step(delta) {
        const next = active + delta;
        if (next < 0) { wrapTo(portals.length - 1); return; }
        if (next >= portals.length) { wrapTo(0); return; }
        center(next);
      }

      /* ── Waymark dots, one per gate ─────────────────────────── */
      const dots = portals.map((p, i) => {
        const b = document.createElement('button');
        b.type = 'button';
        b.setAttribute('aria-label', 'Go to ' + p.querySelector('.portal__title').textContent.trim());
        b.addEventListener('click', () => center(i));
        waymarks.appendChild(b);
        return b;
      });

      /* ── Desktop: arrows and drag-to-scroll ─────────────────── */
      if (window.matchMedia('(hover: hover) and (pointer: fine)').matches) {
        // On a mouse, the gesture is a click, not a tap.
        const hint = document.querySelector('.hint');
        if (hint) hint.textContent = 'Click a gate to enter';

        const makeArrow = (dir, label, glyph) => {
          const b = document.createElement('button');
          b.type = 'button';
          b.className = 'arrow arrow--' + dir;
          b.setAttribute('aria-label', label);
          b.textContent = glyph;
          b.addEventListener('click', () => step(dir === 'next' ? 1 : -1));
          gallery.appendChild(b);
          return b;
        };
        // The way loops, so neither arrow is ever a dead end.
        prevBtn = makeArrow('prev', 'Previous experience', '‹');
        nextBtn = makeArrow('next', 'Next experience', '›');

        // Drag the strip with the mouse. Capture begins only once the pointer
        // has actually travelled past a small threshold — a plain click never
        // grabs the pointer, so the gate beneath it stays clickable. (Capturing
        // on pointerdown would make Chromium retarget the click to the strip,
        // and the portals would stop responding to clicks entirely.)
        let down = false, dragging = false, dragged = false, startX = 0, startLeft = 0;
        const THRESHOLD = 6;
        const OVERSCROLL = 56; // dragged this far past either end: wrap instead of stop
        strip.addEventListener('pointerdown', e => {
          if (wrapping || e.pointerType !== 'mouse' || e.button !== 0) return;
          down = true; dragging = false; dragged = false;
          startX = e.clientX; startLeft = strip.scrollLeft;
        });
        strip.addEventListener('pointermove', e => {
          if (!down) return;
          const dx = e.clientX - startX;
          if (!dragging) {
            if (Math.abs(dx) < THRESHOLD) return;   // still just a click, not a drag
            dragging = true; dragged = true;
            strip.classList.add('dragging');
            strip.setPointerCapture(e.pointerId);
          }
          const max = strip.scrollWidth - strip.clientWidth;
          const target = startLeft - dx;
          if (target < -OVERSCROLL) { stopDrag(); wrapTo(portals.length - 1); return; }
          if (target > max + OVERSCROLL) { stopDrag(); wrapTo(0); return; }
          strip.scrollLeft = Math.max(0, Math.min(max, target));
        });
        const stopDrag = () => {
          down = false;
          dragging = false;
          strip.classList.remove('dragging');
        };
        const endDrag = () => {
          if (!dragging) { down = false; return; }
          stopDrag();
          center(nearest());
        };
        strip.addEventListener('pointerup', endDrag);
        strip.addEventListener('pointercancel', endDrag);
        // A release at the end of a real drag must not walk through a gate.
        strip.addEventListener('click', e => {
          if (dragged) { e.preventDefault(); e.stopPropagation(); dragged = false; }
        }, true);
      }

      // Touch: the browser already handles panning and snapping, so we
      // only watch for a swipe that *starts* already resting at one end
      // and keeps going outward past a threshold — that's a deliberate
      // "continue past the edge", not just arriving there.
      {
        const OVERSCROLL = 56;
        let touchStartX = 0, touchStartLeft = 0, touchMax = 0, touchWrapped = false, touching = false;
        strip.addEventListener('touchstart', e => {
          if (wrapping || e.touches.length !== 1) { touching = false; return; }
          touching = true; touchWrapped = false;
          touchStartX = e.touches[0].clientX;
          touchStartLeft = strip.scrollLeft;
          touchMax = strip.scrollWidth - strip.clientWidth;
        }, { passive: true });
        strip.addEventListener('touchmove', e => {
          if (!touching || touchWrapped || wrapping) return;
          const dx = e.touches[0].clientX - touchStartX;
          if (touchStartLeft <= 0 && dx > OVERSCROLL) {
            touchWrapped = true;
            wrapTo(portals.length - 1);
          } else if (touchStartLeft >= touchMax - 1 && -dx > OVERSCROLL) {
            touchWrapped = true;
            wrapTo(0);
          }
        }, { passive: true });
        strip.addEventListener('touchend', () => { touching = false; }, { passive: true });
        strip.addEventListener('touchcancel', () => { touching = false; }, { passive: true });
      }

      // Trackpad: a two-finger swipe fires wheel events with deltaX rather
      // than touch or pointer events, so it never reached the checks above
      // — the strip just clamped at the edge and stopped. Once already
      // clamped, wheel deltas that keep pushing the same direction add up
      // to the same "keep going past the edge" intent.
      {
        const OVERSCROLL = 80;
        let wheelAccum = 0;
        let wheelResetTimer = null;
        strip.addEventListener('wheel', e => {
          if (wrapping) return;
          const max = strip.scrollWidth - strip.clientWidth;
          const pushingBack    = strip.scrollLeft <= 0 && e.deltaX < 0;
          const pushingForward = strip.scrollLeft >= max - 1 && e.deltaX > 0;
          if (!pushingBack && !pushingForward) { wheelAccum = 0; return; }
          wheelAccum += Math.abs(e.deltaX);
          clearTimeout(wheelResetTimer);
          wheelResetTimer = setTimeout(() => { wheelAccum = 0; }, 200);
          if (wheelAccum > OVERSCROLL) {
            wheelAccum = 0;
            wrapTo(pushingBack ? portals.length - 1 : 0);
          }
        }, { passive: true });
      }

      /* ── Walking through a gate ─────────────────────────────── */
      function enter(portal) {
        if (leaving) return;
        leaving = true;
        portal.classList.add('opening');
        document.body.classList.add('leaving');
        // Navigate just as the room finishes fading (see body's 0.24s+0.04s
        // opacity transition). Kept brief on purpose: the destination pages
        // are tiny and prefetched, so a longer hold here is dead time the
        // visitor reads as "slow to load" rather than as ceremony.
        setTimeout(() => { window.location.href = portal.getAttribute('href'); }, reduced ? 150 : 300);
      }

      portals.forEach((p, i) => {
        p.addEventListener('click', e => {
          // Let the browser keep its own behaviors: new tab, window, etc.
          if (e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.button === 1) return;
          e.preventDefault();
          if (leaving) return;
          if (e.detail === 0) { enter(p); return; }        // keyboard activation
          if (i !== active) { center(i); return; }          // a side gate: step up to it first
          enter(p);
        });
        // Tabbing to a gate brings it to the center of the way.
        p.addEventListener('focusin', () => { if (!leaving) center(i); });
      });

      /* ── Arrow keys walk the gallery ────────────────────────── */
      document.addEventListener('keydown', e => {
        if (leaving || wrapping) return;
        if (e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') return;
        e.preventDefault();
        step(e.key === 'ArrowRight' ? 1 : -1);
      });

      /* ── Housekeeping ───────────────────────────────────────── */
      // Back button after entering restores this page from the bfcache,
      // mid-departure state and all. Undo it.
      window.addEventListener('pageshow', e => {
        if (!e.persisted) return;
        leaving = false;
        wrapping = false;
        document.body.classList.remove('leaving');
        document.body.classList.add('lit');
        strip.classList.remove('fading');
        portals.forEach(p => p.classList.remove('opening'));
        setActive(nearest());
      });

      // Open on Eden — the middle gate — so either neighbor is one swipe away.
      const start = Math.min(1, portals.length - 1);
      center(start, true);
      setActive(start);

      // Arrival: two frames so the transition from the unlit state applies.
      requestAnimationFrame(() => requestAnimationFrame(() => document.body.classList.add('lit')));
    })();
  </script>
</body>
</html>
