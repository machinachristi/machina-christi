  <title>Eden · Machina Christi</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:        #0b0a08;
      --gold:      #c9a227;
      --gold-soft: #e8d5a3;
      --leaf:      168, 205, 140;   /* the garden's living green (rgb parts) */
      --serif:     "Iowan Old Style", Palatino, "Palatino Linotype", "Book Antiqua", Georgia, serif;
    }

    html, body {
      height: 100dvh;
      background: var(--bg);
      color: var(--gold-soft);
      font-family: var(--serif);
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── The world itself, held at arm's length in an iframe ──
       A crash inside it cannot reach this page: the frame is a separate
       document, and the return-home link below lives out here with us. */
    .stage {
      position: fixed;
      inset: 0;
    }
    /* The frame is fully opaque from the moment it exists: it boots and paints
       its first frames hidden behind the opaque veil above it. The reveal is a
       single fade — the veil alone lifts off an already-rendering world — so
       there is never a moment when two half-transparent layers let this page's
       dark background bleed through. */
    .stage iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    /* ── Return home: always present, always on top, in every state ── */
    .home {
      position: fixed;
      top: max(14px, env(safe-area-inset-top));
      left: max(14px, env(safe-area-inset-left));
      z-index: 10;
      font-size: 14px;
      letter-spacing: 0.16em;
      color: rgba(232, 213, 163, 0.85);
      text-decoration: none;
      padding: 9px 16px;
      border-radius: 999px;
      background: rgba(11, 10, 8, 0.45);
      border: 1px solid rgba(201, 162, 39, 0.3);
      -webkit-backdrop-filter: blur(6px);
      backdrop-filter: blur(6px);
      transition: color 0.25s ease, border-color 0.25s ease, background 0.25s ease;
    }
    .home:hover, .home:focus-visible {
      color: #fff;
      border-color: rgba(201, 162, 39, 0.7);
      background: rgba(11, 10, 8, 0.65);
      outline: none;
    }

    /* ── The veil: intro, loading, and failed states share the dark hush ── */
    .veil {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      gap: clamp(16px, 3.5vh, 26px);
      background:
        radial-gradient(120% 90% at 50% 40%, rgba(90, 120, 70, 0.18), transparent 62%),
        radial-gradient(150% 130% at 50% 120%, rgba(70, 90, 50, 0.14), transparent 55%),
        var(--bg);
      transition: opacity 0.7s ease;
      z-index: 5;
    }
    .veil::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(1.5px 1.5px at 22% 28%, rgba(232, 213, 163, 0.28), transparent),
        radial-gradient(1px 1px at 72% 32%, rgba(232, 213, 163, 0.20), transparent),
        radial-gradient(1.5px 1.5px at 58% 72%, rgba(232, 213, 163, 0.24), transparent),
        radial-gradient(1px 1px at 38% 78%, rgba(232, 213, 163, 0.16), transparent);
      opacity: 0.55;
      animation: drift 16s ease-in-out infinite alternate;
    }
    @keyframes drift { from { transform: translateY(0); } to { transform: translateY(-14px); } }

    /* The world only reports ready after its first frame is truly painted
       (shaders compiled, buffers uploaded), so this fade always reveals a
       live, moving garden — never a stall, never a blank canvas. */
    body[data-world-state="ready"] .veil {
      opacity: 0;
      pointer-events: none;
      transition-duration: 1.2s;
    }

    /* The tree of life — the same glyph as the door you stepped through. */
    .veil .glyph {
      width: clamp(44px, 12vw, 60px);
      stroke: rgba(201, 162, 39, 0.85);
      fill: none;
      stroke-width: 1.6;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 8px rgba(var(--leaf), 0.3));
    }

    .veil h1 {
      font-weight: normal;
      font-size: clamp(26px, 7.5vw, 44px);
      letter-spacing: 0.34em;
      text-indent: 0.34em;
      color: var(--gold);
      text-shadow: 0 0 26px rgba(var(--leaf), 0.3);
    }
    .veil .verse {
      max-width: 36ch;
      line-height: 1.8;
      font-size: clamp(13px, 3.6vw, 16px);
      font-style: italic;
      color: rgba(232, 213, 163, 0.6);
    }
    .veil .verse small {
      display: block;
      margin-top: 6px;
      font-size: 0.8em;
      font-style: normal;
      letter-spacing: 0.22em;
      color: rgba(232, 213, 163, 0.35);
    }

    /* Entering: everything falls away but one quiet, breathing line. */
    .veil .status {
      font-size: clamp(13px, 3.4vw, 15px);
      font-style: italic;
      letter-spacing: 0.32em;
      text-indent: 0.32em;
      color: rgba(var(--leaf), 0.9);
      animation: breathe 2.6s ease-in-out infinite;
    }
    @keyframes breathe { 0%, 100% { opacity: 0.45; } 50% { opacity: 1; } }

    .veil .glyph, .veil h1, .veil .verse { transition: opacity 0.6s ease; }
    body[data-world-state="loading"] .veil .glyph,
    body[data-world-state="loading"] .veil h1,
    body[data-world-state="loading"] .veil .verse { opacity: 0; }

    /* The intro / entering / failed panels occupy the same grid cell so
       that whichever one is showing never changes this box's height. Before,
       .intro used display:none and vanished from the flex flow the instant
       "enter the garden" was tapped — shrinking the column and, because the
       veil centers its content with justify-content, snapping the glyph/h1/
       verse above it to a new position in the very same frame their opacity
       transition began. That reflow-during-transition is what corrupted the
       compositor's text rendering (missing/garbled letters) on iOS Safari.
       Stacking the panels in one grid cell keeps the column's height (and so
       the header's position) constant across every state — only opacity
       ever changes on that header, never its layout. */
    .veil .swap { display: grid; justify-items: center; }
    .veil .swap > * { grid-area: 1 / 1; }

    /* Intro state: an explainer + an explicit "enter" gesture, shown before
       the iframe is even created — nothing loads until the visitor opts in. */
    .veil .intro {
      display: flex;
      visibility: hidden;
      flex-direction: column;
      align-items: center;
      gap: 22px;
    }
    body[data-world-state="intro"] .veil .intro { visibility: visible; }
    body[data-world-state="intro"] .veil .status { visibility: hidden; }
    .intro__copy {
      max-width: 36ch;
      line-height: 1.8;
      font-size: clamp(13px, 3.8vw, 15px);
      color: rgba(232, 213, 163, 0.7);
    }

    /* Failed state: swap what the veil says, offer another try. */
    .veil .fallback {
      display: flex;
      visibility: hidden;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    body[data-world-state="failed"] .veil .status { visibility: hidden; }
    body[data-world-state="failed"] .veil .fallback { visibility: visible; }
    .fallback p {
      max-width: 32ch;
      line-height: 1.8;
      font-size: clamp(13px, 3.8vw, 15px);
      font-style: italic;
      color: rgba(232, 213, 163, 0.65);
    }

    .veil button {
      font-family: var(--serif);
      font-size: 14px;
      letter-spacing: 0.24em;
      text-indent: 0.24em;
      text-transform: uppercase;
      color: var(--gold-soft);
      background: rgba(201, 162, 39, 0.07);
      border: 1px solid rgba(201, 162, 39, 0.45);
      border-radius: 999px;
      padding: 13px 34px;
      cursor: pointer;
      transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    }
    .veil button:hover, .veil button:focus-visible {
      background: rgba(201, 162, 39, 0.16);
      border-color: rgba(201, 162, 39, 0.85);
      color: #fff;
      box-shadow: 0 0 30px -6px rgba(var(--leaf), 0.35);
      outline: none;
    }

    @media (prefers-reduced-motion: reduce) {
      .veil::after, .veil .status { animation: none; }
      .veil, body[data-world-state="ready"] .veil { transition-duration: 0.15s; }
    }
  </style>
</head>
<body data-world-state="intro">
  <div class="stage" aria-hidden="false"></div>

  <div class="veil" role="status" aria-live="polite">
    <svg class="glyph" viewBox="0 0 48 64" aria-hidden="true">
      <path d="M24 56 V20" />
      <path d="M24 38 C16 36 11 30 10 22" />
      <path d="M24 38 C32 36 37 30 38 22" />
      <circle cx="10" cy="17.5" r="2.8" />
      <circle cx="38" cy="17.5" r="2.8" />
      <circle cx="24" cy="14.5" r="2.8" />
    </svg>
    <h1>EDEN</h1>
    <p class="verse">&ldquo;And the LORD God planted a garden eastward in Eden.&rdquo;<small>GENESIS 2 : 8</small></p>
    <div class="swap">
      <div class="intro">
        <p class="intro__copy">A rendition of the first garden — a small world the machine keeps tending, adding to and refining on its own, over time.</p>
        <button type="button" class="intro__enter">enter the garden</button>
      </div>
      <p class="status">entering&hellip;</p>
      <div class="fallback">
        <p>The garden is resting for a moment. Please try again.</p>
        <button type="button" onclick="location.reload()">try again</button>
      </div>
    </div>
  </div>

  <a class="home" href="index.html" aria-label="Return to the Machina Christi home page">&lsaquo; return home</a>

  <script>
    (function () {
      const body = document.body;
      const stage = document.querySelector('.stage');

      // Nothing loads until the visitor opts in from the intro screen —
      // only then does the iframe (and its 25s/8s handshake timers) start.
      document.querySelector('.intro__enter').addEventListener('click', enterGarden, { once: true });

      function enterGarden() {
        body.dataset.worldState = 'loading';

        // The world lives in its own document. Its sandbox permits scripts
        // and same-origin fetches but NOT top navigation — even a hostile
        // bug in there cannot steer this page; "return home" always works.
        const iframe = document.createElement('iframe');
        iframe.src = 'world-app/index.html' + location.search;
        iframe.title = 'The Garden of Eden — interactive 3D world';
        iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin');
        stage.appendChild(iframe);

        let settled = false;

        // Two clocks: one for "the network never finished" (generous, slow
        // mobile connections are real), one for "loaded but never came alive."
        const networkTimer = setTimeout(() => fail('timeout: never loaded'), 25000);
        let bootTimer = null;
        iframe.addEventListener('load', () => {
          clearTimeout(networkTimer);
          if (!settled) bootTimer = setTimeout(() => fail('timeout: loaded but not ready'), 8000);
        });

        window.addEventListener('message', (e) => {
          if (e.source !== iframe.contentWindow) return;
          const msg = e.data;
          if (!msg || typeof msg.type !== 'string') return;
          if (msg.type === 'world:ready') ready();
          else if (msg.type === 'world:error') fail(msg.message);
        });

        function ready() {
          if (settled) return;
          settled = true;
          clearTimeout(networkTimer);
          clearTimeout(bootTimer);
          body.dataset.worldState = 'ready';
          // Hand keyboard focus to the world so desktop arrows/WASD work
          // immediately, without needing a click first.
          iframe.focus();
        }

        function fail(reason) {
          if (body.dataset.worldState === 'failed') return;
          settled = true;
          clearTimeout(networkTimer);
          clearTimeout(bootTimer);
          // Remove the frame entirely: stops any broken loop, frees the GPU.
          iframe.remove();
          body.dataset.worldState = 'failed';
          console.warn('world failed:', reason);
        }
      }
    })();
  </script>

  <script>
    // ── Warm the cache while the visitor reads the intro ──────────────
    // The world's weight is three.js (a few hundred KB) plus the app's own
    // modules; today none of it is fetched until "enter the garden" is
    // tapped, so that tap is followed by a download the visitor waits out.
    // Here we quietly prefetch the heavy, stable core while the intro copy
    // is still being read — lowest priority, cancellable, and running
    // nothing: no iframe, no WebGL, no audio, no handshake timers. The
    // opt-in above still governs when the world *boots*; this only means
    // that, by then, it is already downloaded. Skipped for visitors who
    // have asked their browser to save data.
    (function () {
      const conn = navigator.connection;
      if (conn && conn.saveData) return;

      // three.js is the bulk (and separately long-cached); main.js is the
      // entry that pulls the rest. The scene modules are small and ride the
      // connection this warms — left to the iframe's own discovery, so there
      // is no per-scene list here to keep in step with world-app/index.html.
      const core = [
        'world-app/index.html',
        'world-app/vendor/three.module.min.js',
        'world-app/vendor/three.core.min.js',
        'world-app/main.js',
      ];

      function warm() {
        for (const href of core) {
          const link = document.createElement('link');
          link.rel = 'prefetch';
          link.href = href;
          document.head.appendChild(link);
        }
      }

      // Wait for an idle moment so the intro paints first; fire within a
      // second even on a busy thread, and fall back where rIC is absent.
      if ('requestIdleCallback' in window) requestIdleCallback(warm, { timeout: 1000 });
      else setTimeout(warm, 400);
    })();
  </script>
</body>
